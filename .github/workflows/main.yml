name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'  # daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Stats Cards
        uses: readme-tools/github-readme-stats-action@v1  # or latest version
        with:
          card: top-langs
          options: >-
            username=${{ github.repository_owner }}
            &count_private=true
            &show_icons=true
            &theme=dracula  # or any theme: radical, dark, etc.
            &langs_count=10
            &hide=html,css,tex  # optional: noise filters
            &layout=compact
          path: profile/top-langs.svg
          token: ${{ secrets.PAT }}  # your private token here!

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update stats cards" || echo "No changes to commit"
          git push
